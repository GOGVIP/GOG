<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOG Links</title>

<style>
:root {
  --main-color: #f5b041; /* لون الأزرار */
}

/* الخلفية */
body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  color: white;

  /* اختار واحد بس 👇 */

  /* لون */
  background: #0b0b0b;

  /* أو صورة */
  /* background: url("bg.jpg") no-repeat center center/cover; */
}

/* يخلي كل المحتوى في النص */
.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center; /* عمودي */
  align-items: center;     /* أفقي */
}

/* اللوجو */
.logo img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

/* حركة */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

/* الأزرار */
.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px;
  padding: 15px;
  width: 280px;
  border-radius: 15px;
  background: linear-gradient(45deg, var(--main-color), #8a5a00);
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.icon {
  font-size: 20px;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">
    <!-- حط اللوجو هنا -->
    <img src="logo.gif" alt="logo">
  </div>

  <a href="#" class="btn">
    TIGER VIP
    <span class="icon">🎮</span>
  </a>

  <a href="#" class="btn">
    TIGER VIP
    <span class="icon">💬</span>
  </a>

  <a href="#" class="btn">
    TIGER VIP
    <span class="icon">📢</span>
  </a>

  <a href="#" class="btn">
    TIGER VIP
    <span class="icon">📱</span>
  </a>

</div>

</body>
</html>
