<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOG Links</title>

<style>
:root {
  --main-color: #f5b041; /* غير اللون من هنا */
}

body {
  background: #0b0b0b;
  font-family: Arial;
  text-align: center;
  color: white;
}

.logo {
  margin-top: 40px;
}

.logo img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  animation: float 3s ease-in-out infinite;
}

/* حركة بسيطة للوجو */
@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 20px auto;
  padding: 15px;
  width: 280px;
  border-radius: 15px;
  background: linear-gradient(45deg, var(--main-color), #000000);
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.icon {
  font-size: 20px;
}
</style>

</head>

<body>

<div class="logo">
  <!-- حط اللوجو هنا (PNG أو GIF متحرك) -->
  <img src="logo.gif" alt="logo">
</div>

<a href="#" class="btn">
  GOG VIP
  <span class="icon">🎮</span>
</a>

<a href="#" class="btn">
  GOG VIP
  <span class="icon">💬</span>
</a>

<a href="#" class="btn">
  GOG VIP
  <span class="icon">📢</span>
</a>

<a href="#" class="btn">
  GOG VIP
  <span class="icon">📱</span>
</a>

</body>
</html>
