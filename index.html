<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOG Links</title>

<style>
:root {
  --main-color: #cf0000;
}

body {
  margin: 0;
  height: 100vh;
  font-family: Arial;
  color: white;
  background: #0b0b0b;
}

.container {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  margin-bottom: 20px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
  100% { transform: translateY(0px); }
}

.btn {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 10px;
  padding: 15px;
  width: 280px;
  border-radius: 15px;
  background: linear-gradient(45deg, var(--main-color), #8a5a00);
  color: black;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.icon {
  width: 25px;
  height: 25px;
}
</style>

</head>

<body>

<div class="container">

  <div class="logo">
    <img src="https://cdn.discordapp.com/attachments/1485108117288124546/1485108376873599107/a94dcd58a593a93b.png" alt="logo">
  </div>

  <a href="https://t.me/GOG_BYPASS" class="btn">
    TELEGRAM CHANNEL
    <img src="https://imagepng.org/wp-content/uploads/2017/11/telegram-icone-icon.png" class="icon">
  </a>

  <a href="https://t.me/GOG_BYPASS1" class="btn">
    TELEGRAM GROUP
    <img src="https://imagepng.org/wp-content/uploads/2017/11/telegram-icone-icon.png" class="icon">
  </a>

  <a href="https://discord.gg/gdwY5Saxj7" class="btn">
    DISCORD MAIN GOG
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="icon">
  </a>

  <a href="https://discord.gg/R52Uv2QQYd" class="btn">
    DISCORD BACKUP GOG
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="icon">
  </a>

</div>

</body>
</html>
